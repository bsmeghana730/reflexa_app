{% extends 'rehab/base.html' %}

{% block title %}Error - Reflexa{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 4rem auto; text-align: center;">
    <div style="background: #fee2e2; color: #b91c1c; padding: 2rem; border-radius: 12px; border: 1px solid #fecaca;">

        <p style="margin-bottom: 2rem;">{{ message }}</p>

    </div>
</div>
{% endblock %}
